<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4CAF50">
    <title>AI陪伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 20px 0;
        }
        
        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .persona-selector {
            margin-bottom: 15px;
        }
        
        .persona-selector select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-size: 16px;
            background: white;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            min-height: 300px;
            max-height: 50vh;
        }
        
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 85%;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #4CAF50;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .message.ai {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 5px;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .input-area input {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            font-size: 16px;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: #4CAF50;
        }
        
        .btn {
            padding: 15px 25px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-send {
            background: #4CAF50;
            color: white;
        }
        
        .btn-send:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .btn-voice {
            background: #ff5722;
            color: white;
            font-size: 20px;
            padding: 15px;
        }
        
        .btn-voice:hover {
            background: #e64a19;
        }
        
        .btn-voice.recording {
            animation: pulse 1s infinite;
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .voice-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        
        .voice-selector {
            flex: 1;
        }
        
        .voice-selector select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-size: 14px;
        }
        
        .install-banner {
            background: #2196F3;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .install-banner button {
            background: white;
            color: #2196F3;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            margin-left: 10px;
            cursor: pointer;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💝 AI陪伴</h1>
            <p>与思念的人温暖对话</p>
        </header>
        
        <div class="chat-container">
            <div class="install-banner" id="installBanner" style="display: none;">
                <span>安装应用到桌面</span>
                <button onclick="installApp()">安装</button>
            </div>
            
            <div class="persona-selector">
                <select id="personaSelect" onchange="selectPersona()">
                    <option value="">-- 选择人格 --</option>
                    <option value="grandma">奶奶</option>
                    <option value="grandpa">爷爷</option>
                </select>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    你好，我是AI陪伴。\n请先选择一个人格，然后开始对话吧！
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-send" onclick="sendMessage()">发送</button>
            </div>
            
            <div class="voice-controls">
                <div class="voice-selector">
                    <select id="voiceSelect">
                        <option value="zh-CN-XiaoxiaoNeural">晓晓（女声）</option>
                        <option value="zh-CN-YunxiNeural">云希（男声）</option>
                        <option value="zh-CN-XiaoyiNeural">晓伊（女声）</option>
                        <option value="zh-CN-YunyangNeural">云扬（男声）</option>
                    </select>
                </div>
                <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">🎤</button>
            </div>
            
            <div class="status" id="status">就绪</div>
        </div>
    </div>
    
    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });
        
        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installBanner').style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            }
        }
        
        async function selectPersona() {
            const persona = document.getElementById('personaSelect').value;
            document.getElementById('status').textContent = `已选择: ${persona}`;
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const persona = document.getElementById('personaSelect').value;
            if (!persona) {
                alert('请先选择一个人格');
                return;
            }
            
            addMessage(message, 'user');
            input.value = '';
            
            document.getElementById('status').textContent = 'AI思考中...';
            
            // 模拟AI回复（实际使用时连接到后端API）
            setTimeout(() => {
                const responses = [
                    '听到你这么说，我很开心',
                    '我也很想念你',
                    '要多保重身体哦',
                    '有什么想聊的都可以跟我说',
                    '你今天过得怎么样？'
                ];
                const response = responses[Math.floor(Math.random() * responses.length)];
                addMessage(response, 'ai');
                document.getElementById('status').textContent = '就绪';
            }, 1000);
        }
        
        function addMessage(text, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function toggleVoice() {
            const voiceBtn = document.getElementById('voiceBtn');
            
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await processAudio(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('recording');
                    voiceBtn.textContent = '⏹️';
                    document.getElementById('status').textContent = '录音中...';
                } catch (err) {
                    console.error('无法访问麦克风:', err);
                    alert('无法访问麦克风，请检查权限设置');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
            }
        }
        
        async function processAudio(audioBlob) {
            document.getElementById('status').textContent = '识别中...';
            
            // 实际使用时，通过Web Speech API或后端API识别语音
            // 这里简化为模拟
            setTimeout(() => {
                const texts = [
                    '你好',
                    '我想你了',
                    '你今天过得怎么样',
                    '给我讲个故事吧'
                ];
                const text = texts[Math.floor(Math.random() * texts.length)];
                
                addMessage(`你说: ${text}`, 'user');
                
                setTimeout(() => {
                    const responses = [
                        '你好呀！',
                        '我也想你！',
                        '今天挺好的，你呢？',
                        '从前有座山...'
                    ];
                    const response = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(response, 'ai');
                    
                    // 播放语音回复
                    speakText(response);
                    document.getElementById('status').textContent = '就绪';
                }, 500);
            }, 500);
        }
        
        async function speakText(text) {
            const voiceSelect = document.getElementById('voiceSelect');
            const voice = voiceSelect.value;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1;
                utterance.pitch = 1;
                
                const voices = speechSynthesis.getVoices();
                const selectedVoice = voices.find(v => v.lang.includes('zh'));
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                
                speechSynthesis.speak(utterance);
            }
        }
        
        // 预加载语音
        if ('speechSynthesis' in window) {
            speechSynthesis.getVoices();
            speechSynthesis.onvoiceschanged = () => {
                speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
